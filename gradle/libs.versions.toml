[versions]
kotlin = "1.9.10"                                   # https://github.com/JetBrains/kotlin/releases
kotlin-immutable = "0.3.6"                          # https://github.com/Kotlin/kotlinx.collections.immutable/releases
kotlin-coroutines = "1.7.3"                         # https://github.com/Kotlin/kotlinx.coroutines/releases
kotlin-serialization = "1.6.0"                      # https://github.com/Kotlin/kotlinx.serialization/releases

javafx = "0.1.0"                                    # https://github.com/openjfx/javafx-gradle-plugin/releases

android-gradle = "8.1.2"                            # https://developer.android.com/build/releases/gradle-plugin

material = "1.10.0"                                 # https://github.com/material-components/material-components-android/releases
activity = "1.8.0"                                  # https://developer.android.com/jetpack/androidx/releases/activity
navigation = "2.7.4"                                # https://developer.android.com/jetpack/androidx/releases/navigation
lifecycle = "2.6.2"                                 # https://developer.android.com/jetpack/androidx/releases/lifecycle

compose-multiplatform = "1.5.3"                     # https://github.com/JetBrains/compose-multiplatform/releases
compose-compiler = "1.5.3"                          # https://developer.android.com/jetpack/androidx/releases/compose
compose-bom = "2023.10.01"                          # https://developer.android.com/jetpack/compose/bom/bom-mapping

decompose = "2.2.0-compose-experimental-alpha02"    # https://github.com/arkivanov/Decompose/releases
essenty = "1.3.0-alpha02"                           # https://github.com/arkivanov/Essenty/releases

dagger = "2.48.1"                                   # https://github.com/google/dagger/releases
hilt = "1.0.0"                                      # https://developer.android.com/jetpack/androidx/releases/hilt

spotless = "6.22.0"                                 # https://github.com/diffplug/spotless/tree/main/plugin-gradle

[libraries]
kotlin-gradle = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }
kotlin-immutable = { group = "org.jetbrains.kotlinx", name = "kotlinx-collections-immutable", version.ref = "kotlin-immutable" }
kotlin-serialization = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlin-serialization" }

coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlin-coroutines" }

android-gradle = { group = "com.android.tools.build", name = "gradle", version.ref = "android-gradle" }

material = { group = "com.google.android.material", name = "material", version.ref = "material" }
activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activity" }

navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigation" }

lifecycle-viewmodel = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-ktx", version.ref = "lifecycle" }
lifecycle-savedstate = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-savedstate", version.ref = "lifecycle" }

compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "compose-bom" }
compose-ui = { group = "androidx.compose.ui", name = "ui" }

hilt-android = { group = "com.google.dagger", name = "hilt-android", version.ref = "dagger" }
hilt-compose = { group = "androidx.hilt", name = "hilt-navigation-compose", version.ref = "hilt" }
hilt-compiler = { group = "com.google.dagger", name = "hilt-compiler", version.ref = "dagger" }

decompose = { group = "com.arkivanov.decompose", name = "decompose", version.ref = "decompose" }
decompose-compose = { group = "com.arkivanov.decompose", name = "extensions-compose-jetbrains", version.ref = "decompose" }
essenty-lifecycle = { group = "com.arkivanov.essenty", name = "lifecycle", version.ref = "essenty" }

[plugins]
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-cocoapods = { id = "org.jetbrains.kotlin.native.cocoapods", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
kotlin-kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }

javafx = { id = "org.openjfx.javafxplugin", version.ref = "javafx" }

android-application = { id = "com.android.application", version.ref = "android-gradle" }
android-library = { id = "com.android.library", version.ref = "android-gradle" }

compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "compose-multiplatform" }
hilt-android = { id = "com.google.dagger.hilt.android", version.ref = "dagger" }

spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }