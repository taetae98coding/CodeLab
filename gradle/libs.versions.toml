[versions]
kotlin = "1.9.10"                           # https://github.com/JetBrains/kotlin/releases

javafx = "0.1.0"                            # https://github.com/openjfx/javafx-gradle-plugin/releases

android-gradle = "8.1.2"                    # https://developer.android.com/build/releases/gradle-plugin

material = "1.10.0"                         # https://github.com/material-components/material-components-android/releases
activity = "1.8.0"                          # https://developer.android.com/jetpack/androidx/releases/activity
navigation = "2.7.4"                        # https://developer.android.com/jetpack/androidx/releases/navigation

compose-multiplatform = "1.5.3"             # https://github.com/JetBrains/compose-multiplatform/releases
compose-compiler = "1.5.3"                  # https://developer.android.com/jetpack/androidx/releases/compose
compose-bom = "2023.10.01"                  # https://developer.android.com/jetpack/compose/bom/bom-mapping

spotless = "6.22.0"                         # https://github.com/diffplug/spotless/tree/main/plugin-gradle

[libraries]
kotlin-gradle = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }

android-gradle = { group = "com.android.tools.build", name = "gradle", version.ref = "android-gradle" }

material = { group = "com.google.android.material", name = "material", version.ref = "material" }
activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activity" }
navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigation" }

compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "compose-bom" }
compose-foundation = { group = "androidx.compose.foundation", name = "foundation" }

[plugins]
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-cocoapods = { id = "org.jetbrains.kotlin.native.cocoapods", version.ref = "kotlin" }

javafx = { id = "org.openjfx.javafxplugin", version.ref = "javafx" }

android-application = { id = "com.android.application", version.ref = "android-gradle" }
android-library = { id = "com.android.library", version.ref = "android-gradle" }

compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "compose-multiplatform" }

spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }